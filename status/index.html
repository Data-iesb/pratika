<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prátika - Status do Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Special+Elite&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lora', serif; background: #b5311e; color: #2c2c2c; min-height: 100vh; overflow-x: hidden; }
        nav { background: #f5f0e8; border-bottom: 3px solid #2c2c2c; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: #c0392b; text-decoration: none; transform: rotate(-2deg); display: inline-block; }
        .content { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; position: relative; z-index: 1; }
        .paper { background: #f5f0e8; padding: 2rem; margin: 1.5rem 0; position: relative; box-shadow: 4px 4px 0 rgba(0,0,0,0.25); border: 1px solid #d4c9b8; }
        .paper::before { content: ''; position: absolute; top: -8px; left: 30px; width: 60px; height: 20px; background: rgba(200,200,100,0.6); transform: rotate(-2deg); }
        .paper:nth-child(odd) { transform: rotate(-0.3deg); }
        .paper:nth-child(even) { transform: rotate(0.4deg); }
        .paper:nth-child(even)::before { left: auto; right: 40px; background: rgba(100,180,200,0.5); transform: rotate(1deg); }
        .paper h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #c0392b; margin-bottom: 1rem; border-bottom: 2px dashed #c0392b; padding-bottom: 0.5rem; }
        .clip { position: absolute; top: -12px; right: 20px; font-size: 1.5rem; }
        .item { font-family: 'Special Elite', monospace; font-size: 1rem; line-height: 2; padding: 0.3rem 0; }
        .item .ok { color: #27ae60; }
        .item .err { color: #c0392b; }
        .item .wait { color: #f39c12; }
        .progress { background: #d4c9b8; border-radius: 4px; height: 12px; margin: 0.8rem 0; overflow: hidden; border: 2px solid #2c2c2c; }
        .progress-bar { height: 100%; background: #27ae60; transition: width 0.5s; }
        .timestamp { font-family: 'Special Elite', monospace; font-size: 0.8rem; color: #888; margin-top: 0.5rem; }
        footer { background: #2c2c2c; color: #f5f0e8; text-align: center; padding: 1.5rem; margin-top: 2rem; font-family: 'Special Elite', monospace; position: relative; z-index: 1; }
        footer a { color: #f5f0e8; text-decoration: none; }
        @media(max-width:600px) { .content { padding: 0 1rem; } .paper { padding: 1.5rem; } nav { padding: 0.75rem 1rem; } .logo { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <nav>
        <a href="https://pratika.blog.br" class="logo">Prátika</a>
        <span style="font-family:'Special Elite',monospace;color:#2c2c2c;">Status do Site</span>
    </nav>

    <div class="content">
        <div class="paper">
            <span class="clip">📋</span>
            <h2>Publicações</h2>
            <div class="progress"><div class="progress-bar" id="sync-bar" style="width:0%"></div></div>
            <div id="sync-log"><p class="item wait">⏳ Verificando...</p></div>
        </div>

        <div class="paper">
            <span class="clip">📌</span>
            <h2>Site no Ar?</h2>
            <div class="progress"><div class="progress-bar" id="cf-bar" style="width:0%"></div></div>
            <div id="cf-log"><p class="item wait">⏳ Verificando...</p></div>
        </div>

        <div class="paper">
            <span class="clip">📎</span>
            <h2>Serviços</h2>
            <div id="services-log"><p class="item wait">⏳ Verificando...</p></div>
        </div>
    </div>

    <footer>
        <p>Atualiza automaticamente a cada 30 segundos</p>
        <p style="margin-top:0.5rem;"><a href="https://pratika.blog.br">← Voltar para o site</a></p>
    </footer>

    <script>
    async function verificar() {
        const syncLog = document.getElementById('sync-log');
        const cfLog = document.getElementById('cf-log');
        const servicesLog = document.getElementById('services-log');
        const syncBar = document.getElementById('sync-bar');
        const cfBar = document.getElementById('cf-bar');

        let ghostOk = false, posts = [];
        try {
            const r = await fetch('https://pratika.dataiesb.com/ghost/api/content/posts/?key=da4efa0ae7b57f627d5bd77a17&limit=all&fields=title,slug,published_at,updated_at');
            if (r.ok) { ghostOk = true; posts = (await r.json()).posts || []; }
        } catch(e) {}

        let siteOk = false, lastMod = '';
        try {
            const r = await fetch('https://pratika.blog.br/', {method:'HEAD'});
            siteOk = r.ok;
            lastMod = r.headers.get('last-modified') || '';
        } catch(e) {}

        // Publicações
        let html = '';
        if (posts.length > 0) {
            html += `<p class="item ok">✅ ${posts.length} matéria${posts.length > 1 ? 's' : ''} publicada${posts.length > 1 ? 's' : ''}</p>`;
            posts.forEach(p => {
                const d = new Date(p.published_at).toLocaleDateString('pt-BR');
                html += `<p class="item ok">📰 ${p.title} — ${d}</p>`;
            });
            syncBar.style.width = '100%';
        } else {
            html += '<p class="item err">❌ Nenhuma matéria encontrada</p>';
            syncBar.style.width = '10%';
        }
        const agora = new Date().toLocaleString('pt-BR');
        html += `<p class="timestamp">Última verificação: ${agora}</p>`;
        syncLog.innerHTML = html;

        // Site no ar
        if (siteOk) {
            cfLog.innerHTML = `<p class="item ok">✅ Site funcionando normalmente</p><p class="item ok">🌐 pratika.blog.br — online</p><p class="timestamp">Última atualização do conteúdo: ${lastMod || 'N/A'}</p>`;
            cfBar.style.width = '100%';
        } else {
            cfLog.innerHTML = '<p class="item err">❌ Site fora do ar</p>';
            cfBar.style.width = '20%';
        }

        // Serviços
        let svc = '';
        svc += ghostOk ? '<p class="item ok">✅ Editor de notícias — funcionando</p>' : '<p class="item err">❌ Editor de notícias — indisponível</p>';
        svc += siteOk ? '<p class="item ok">✅ Site público — funcionando</p>' : '<p class="item err">❌ Site público — indisponível</p>';
        svc += '<p class="item ok">✅ Sincronização automática — ativa</p>';
        servicesLog.innerHTML = svc;
    }

    verificar();
    setInterval(verificar, 30000);
    </script>
</body>
</html>
