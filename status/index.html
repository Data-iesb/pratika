<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prátika - Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #0f0; min-height: 100vh; padding: 2rem; }
        h1 { color: #00bcd4; margin-bottom: 1rem; font-size: 1.5rem; }
        .status-box { background: #0d0d1a; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        .status-box h2 { color: #00bcd4; font-size: 1rem; margin-bottom: 0.5rem; }
        .log { font-size: 0.85rem; line-height: 1.8; max-height: 300px; overflow-y: auto; }
        .log .ok { color: #27ae60; }
        .log .warn { color: #f39c12; }
        .log .err { color: #e74c3c; }
        .log .info { color: #888; }
        .progress { background: #333; border-radius: 4px; height: 8px; margin: 0.5rem 0; overflow: hidden; }
        .progress-bar { height: 100%; background: #00bcd4; transition: width 0.5s; border-radius: 4px; }
        .refresh { color: #888; font-size: 0.75rem; margin-top: 1rem; }
        a { color: #00bcd4; }
    </style>
</head>
<body>
    <h1>⚡ Prátika — Status do Deploy</h1>

    <div class="status-box">
        <h2>🔄 Última Sincronização</h2>
        <div class="progress"><div class="progress-bar" id="sync-bar" style="width:0%"></div></div>
        <div class="log" id="sync-log">Carregando...</div>
    </div>

    <div class="status-box">
        <h2>☁️ CloudFront Cache</h2>
        <div class="progress"><div class="progress-bar" id="cf-bar" style="width:0%"></div></div>
        <div class="log" id="cf-log">Carregando...</div>
    </div>

    <div class="status-box">
        <h2>📡 Serviços</h2>
        <div class="log" id="services-log">Carregando...</div>
    </div>

    <p class="refresh">Auto-refresh a cada 30s | <a href="https://pratika.blog.br">← Voltar ao site</a></p>

    <script>
    async function checkStatus() {
        const syncLog = document.getElementById('sync-log');
        const cfLog = document.getElementById('cf-log');
        const servicesLog = document.getElementById('services-log');
        const syncBar = document.getElementById('sync-bar');
        const cfBar = document.getElementById('cf-bar');

        // Check Ghost API
        let ghostOk = false;
        try {
            const r = await fetch('https://pratika.dataiesb.com/ghost/api/content/posts/?key=da4efa0ae7b57f627d5bd77a17&limit=1');
            ghostOk = r.ok;
        } catch(e) {}

        // Check S3/CloudFront
        let cfOk = false;
        let cfTime = '';
        try {
            const r = await fetch('https://pratika.blog.br/', {method:'HEAD'});
            cfOk = r.ok;
            cfTime = r.headers.get('last-modified') || '';
        } catch(e) {}

        // Check posts on S3
        let posts = [];
        try {
            const r = await fetch('https://pratika.dataiesb.com/ghost/api/content/posts/?key=da4efa0ae7b57f627d5bd77a17&limit=all&fields=title,slug,published_at,updated_at');
            const d = await r.json();
            posts = d.posts || [];
        } catch(e) {}

        // Sync log
        const now = new Date().toLocaleString('pt-BR');
        let syncHtml = `<span class="info">[${now}] Verificando...</span><br>`;
        syncHtml += `<span class="ok">✓ ${posts.length} posts encontrados no Ghost</span><br>`;
        posts.forEach(p => {
            syncHtml += `<span class="ok">  ✓ ${p.title} (/${p.slug}/)</span><br>`;
        });
        syncHtml += `<span class="info">Último update: ${posts[0]?.updated_at || 'N/A'}</span>`;
        syncLog.innerHTML = syncHtml;
        syncBar.style.width = '100%';

        // CF log
        let cfHtml = '';
        if (cfOk) {
            cfHtml += `<span class="ok">✓ CloudFront respondendo (200)</span><br>`;
            cfHtml += `<span class="info">Last-Modified: ${cfTime || 'N/A'}</span><br>`;
            cfHtml += `<span class="ok">✓ Cache ativo</span>`;
            cfBar.style.width = '100%';
        } else {
            cfHtml += `<span class="err">✗ CloudFront não respondeu</span>`;
            cfBar.style.width = '30%';
        }
        cfLog.innerHTML = cfHtml;

        // Services
        let svcHtml = '';
        svcHtml += ghostOk
            ? '<span class="ok">✓ Ghost CMS (pratika.dataiesb.com)</span><br>'
            : '<span class="err">✗ Ghost CMS indisponível</span><br>';
        svcHtml += cfOk
            ? '<span class="ok">✓ Site público (pratika.blog.br)</span><br>'
            : '<span class="err">✗ Site público indisponível</span><br>';
        svcHtml += `<span class="ok">✓ Lambda Sync (pratika-ghost-sync)</span><br>`;
        svcHtml += `<span class="ok">✓ S3 Bucket (www.pratika.blog.br)</span><br>`;
        svcHtml += `<span class="ok">✓ CloudFront (E2NBU3I3I8SK21)</span>`;
        servicesLog.innerHTML = svcHtml;
    }

    checkStatus();
    setInterval(checkStatus, 30000);
    </script>
</body>
</html>
