AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Ghost CMS webhook sync for Pratika

Parameters:
  GhostApiKey:
    Type: String
    NoEcho: true

Globals:
  Function:
    Timeout: 60
    Runtime: python3.12

Resources:
  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pratika-ghost-sync
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          GHOST_API_KEY: !Ref GhostApiKey
          S3_BUCKET: www.pratika.blog.br
          CF_DISTRIBUTION: E2NBU3I3I8SK21
      Policies:
        - S3CrudPolicy:
            BucketName: www.pratika.blog.br
        - Statement:
            - Effect: Allow
              Action:
                - cloudfront:CreateInvalidation
              Resource: "*"
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            Path: /pratika/sync
            Method: POST
            ApiId: !Ref SyncApi

  SyncApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

Outputs:
  WebhookUrl:
    Value: !Sub "https://api.dataiesb.com/pratika/sync"
